<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doc Chatbot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="shell">
      <header class="hero">
        <div>
          <h1>Doc Chatbot</h1>
          <p>Local multimodal model</p>
        </div>
      </header>

      <section class="panel upload">
        <div>
          <h2>Upload documents</h2>
          <p>PDF, PPTX, images, or text. Scanned PDFs will run OCR.</p>
        </div>
        <div class="upload-controls">
          <input type="file" id="fileInput" multiple />
          <button id="uploadBtn">Upload Files</button>
          <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;" />
          <button id="uploadFolderBtn">Upload Folder</button>
          <span id="uploadMsg"></span>
        </div>
        <div class="upload-controls" style="margin-top: 1rem;">
          <input type="text" id="driveUrlInput" placeholder="Paste Google Drive Folder URL..." style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);" />
          <button id="driveImportBtn">Import from Drive</button>
        </div>
      </section>

      <section class="workspace" id="workspace">
        <aside class="panel docs-sidebar" id="docsSidebar">
          <div class="docs-header">
            <h3>Documents</h3>
            <div class="docs-header-actions">
              <button id="collapseSidebarBtn" class="collapse-btn" type="button" aria-expanded="true">Collapse</button>
              <button id="deleteAllBtn" class="delete-all-btn" type="button">Delete All</button>
            </div>
          </div>
          <div class="scope-controls">
            <label class="scope-select-all">
              <input id="selectAllDocs" type="checkbox" checked />
              <span>Select all ready docs</span>
            </label>
            <span id="scopeSummary" class="scope-summary">0/0 selected</span>
          </div>
          <div class="doc-list-wrap">
            <ul id="docList" class="doc-list"></ul>
          </div>
        </aside>

        <div id="sidebarResizer" class="resizer sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize documents sidebar"></div>

        <section class="main-area" id="mainArea">
          <button id="expandSidebarBtn" class="expand-sidebar-btn" type="button" aria-expanded="false">Show Documents</button>
          <div class="panel chat chat-pane" id="chatPane">
            <div class="chat-head">
              <h2>Ask anything about your documents</h2>
              <label class="chat-option">
                <input id="includeDocSummaries" type="checkbox" checked />
                <span>Include document summaries</span>
              </label>
            </div>
            <div class="chat-input-wrap">
              <div class="chat-input">
                <input id="chatInput" type="text" placeholder="Ask about your documents..." />
                <button id="sendBtn">Send</button>
              </div>
            </div>
            <div id="chatLog" class="chat-log"></div>
            <div id="chatResizer" class="resizer chat-resizer" role="separator" aria-orientation="vertical" aria-label="Resize chat panel"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
