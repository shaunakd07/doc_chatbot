version: 1
defaults:
  reset_before: true
  delete_after: false
  delete_all_after: false
  wait_ready: true
  ready_timeout_sec: 2400
  poll_interval_sec: 3.0
  automation_level: full

cases:
  - id: A-001
    suite: A
    title: Single upload lifecycle (PDF)
    objective: Verify baseline PDF upload and ingestion lifecycle completes successfully.
    tags: [ingestion, lifecycle, pdf, contract]
    datasets: [canonical_pdf]
    checks:
      - kind: doc_count_equals
        value: 1
      - kind: all_docs_ready
      - kind: each_doc_num_pages_gt
        value: 0
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks

  - id: A-002
    suite: A
    title: Single upload lifecycle (PPTX)
    objective: Verify PPTX upload path and chunk/embedding persistence.
    tags: [ingestion, lifecycle, pptx]
    datasets: [test_pptx]
    checks:
      - kind: doc_count_equals
        value: 1
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks
      - kind: any_doc_has_source_types
        source_types: [slide_graph, ocr, text]

  - id: A-003
    suite: A
    title: Single upload lifecycle (XLSX)
    objective: Validate spreadsheet ingestion lifecycle for XLSX.
    tags: [ingestion, lifecycle, xlsx]
    datasets: [canonical_xlsx]
    checks:
      - kind: doc_count_equals
        value: 1
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks
      - kind: any_doc_has_source_types
        source_types: [table]

  - id: A-004
    suite: A
    title: Single upload lifecycle (DOCX)
    objective: Validate DOCX extraction path and persistence.
    tags: [ingestion, lifecycle, docx]
    datasets: [canonical_docx]
    checks:
      - kind: doc_count_equals
        value: 1
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks

  - id: A-005
    suite: A
    title: Single upload lifecycle (JPG image)
    objective: Validate image upload path with OCR/diagram metadata generation.
    tags: [ingestion, lifecycle, image, ocr, diagram]
    datasets: [canonical_jpg]
    checks:
      - kind: doc_count_equals
        value: 1
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks
      - kind: any_doc_has_source_types
        source_types: [ocr, image, diagram_graph, diagram_node, diagram_edge]

  - id: A-006
    suite: A
    title: Single upload lifecycle (diagram PNG)
    objective: Validate diagram-heavy PNG lifecycle and graph side outputs.
    tags: [ingestion, lifecycle, image, diagram]
    datasets: [canonical_diagram_png]
    checks:
      - kind: doc_count_equals
        value: 1
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks
      - kind: any_doc_has_source_types
        source_types: [diagram_graph, diagram_node, diagram_edge, ocr]

  - id: A-007
    suite: A
    title: Filename handling with spaces and punctuation
    objective: Validate safe upload path handling for complex filenames.
    tags: [ingestion, lifecycle, filename]
    datasets: [canonical_diagram_png, lakerunner_pptx_multitenant]
    checks:
      - kind: doc_count_equals
        value: 2
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks

  - id: A-008
    suite: A
    title: Sequential mixed uploads (small regression pack)
    objective: Validate end-to-end mixed-format ingestion in one run.
    tags: [ingestion, lifecycle, mixed, regression]
    datasets: [canonical_small_pack]
    checks:
      - kind: doc_count_equals
        value: 6
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks

  - id: B-001
    suite: B
    title: PDF native text extraction
    objective: Ensure native text extraction path creates text chunks for PDF.
    tags: [extractor, pdf, text]
    datasets: [canonical_pdf]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: any_doc_has_source_types
        source_types: [text]

  - id: B-002
    suite: B
    title: PDF image generation for each page
    objective: Ensure page image artifacts and image-linked metadata are generated for PDF pages.
    tags: [extractor, pdf, image]
    datasets: [canonical_pdf]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: any_doc_has_source_types
        source_types: [ocr, image, text]

  - id: B-003
    suite: B
    title: Invoice PDF extraction robustness (10-doc batch)
    objective: Validate invoice extraction quality and stability across all invoice PDFs.
    tags: [extractor, pdf, invoices, batch]
    datasets: [all_invoice_pdfs]
    checks:
      - kind: doc_count_equals
        value: 10
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: each_doc_embeddings_match_chunks

  - id: B-004
    suite: B
    title: PPTX text and table extraction
    objective: Validate slide text/table extraction on representative slide decks.
    tags: [extractor, pptx, table]
    datasets: [test_pptx, canonical_pptx]
    checks:
      - kind: doc_count_equals
        value: 2
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: any_doc_has_source_types
        source_types: [text, table, slide_graph]

  - id: B-005
    suite: B
    title: PPTX embedded image extraction
    objective: Validate extraction of embedded pictures from PPTX and downstream OCR integration.
    tags: [extractor, pptx, image, ocr]
    datasets: [lakerunner_pptx_airtel_prep]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: any_doc_has_source_types
        source_types: [ocr, image, slide_graph]

  - id: B-006
    suite: B
    title: PPTX slide rendering path (LibreOffice)
    objective: Validate the full-slide rendering code path for PPTX.
    tags: [extractor, pptx, rendering]
    datasets: [lakerunner_pptx_airtel_1]
    automation_level: partial
    expected_notes:
      - Slide rendering can be environment-dependent if LibreOffice is unavailable.
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: B-007
    suite: B
    title: DOCX extraction structure
    objective: Validate paragraph/table/image-safe extraction behavior on DOCX.
    tags: [extractor, docx]
    datasets: [canonical_docx]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: B-008
    suite: B
    title: XLSX extraction structure
    objective: Validate spreadsheet table extraction and persistence.
    tags: [extractor, xlsx]
    datasets: [canonical_xlsx]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1
      - kind: any_doc_has_source_types
        source_types: [table]

  - id: C-001
    suite: C
    title: OCR baseline on clean diagram image
    objective: Validate OCR response fields and text extraction on clean diagram input.
    tags: [ocr, image]
    datasets: [canonical_diagram_png]
    checks:
      - kind: all_docs_ready
      - kind: any_doc_has_source_types
        source_types: [ocr, diagram_graph, diagram_node]

  - id: C-002
    suite: C
    title: OCR on transparent image edge case
    objective: Validate OCR/ingestion resilience on transparent PNG inputs.
    tags: [ocr, edge-case, image]
    datasets: [transparent_png]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: C-003
    suite: C
    title: OCR on invoice pages
    objective: Validate OCR behavior on invoice-style PDFs.
    tags: [ocr, invoices, pdf]
    datasets: [representative_invoice_pdfs]
    checks:
      - kind: doc_count_equals
        value: 3
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: C-004
    suite: C
    title: OCR timeout behavior
    objective: Validate ingestion behavior across a 200-image OCR-heavy run.
    tags: [ocr, scale, timeout]
    datasets: [spdocvqa_first_200]
    automation_level: partial
    checks:
      - kind: doc_count_equals
        value: 200
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: C-005
    suite: C
    title: OCR worker restart resilience
    objective: Validate OCR worker recovery semantics around service restart boundaries.
    tags: [ocr, resilience, restart]
    datasets: [test_images_first_50]
    automation_level: manual
    manual_steps:
      - Start ingestion on this case.
      - Restart backend app process while ingestion is active.
      - Re-run remaining images and compare failure rates.
    checks: []

  - id: D-001
    suite: D
    title: Diagram detection on canonical architecture diagram
    objective: Validate graph extraction for canonical diagram input.
    tags: [diagram, graph, image]
    datasets: [canonical_diagram_png]
    checks:
      - kind: all_docs_ready
      - kind: any_doc_has_source_types
        source_types: [diagram_graph, diagram_node, diagram_edge]

  - id: D-002
    suite: D
    title: Diagram false-positive control on non-diagram image
    objective: Validate non-diagram inputs do not break graph serialization.
    tags: [diagram, edge-case, image]
    datasets: [transparent_png]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: D-003
    suite: D
    title: Node OCR labeling quality
    objective: Validate node-level OCR labeling on a complex JPG diagram.
    tags: [diagram, ocr, node]
    datasets: [canonical_jpg]
    checks:
      - kind: all_docs_ready
      - kind: any_doc_has_source_types
        source_types: [diagram_node, ocr]

  - id: D-004
    suite: D
    title: Edge extraction consistency
    objective: Validate graph edge generation and node linkage hints.
    tags: [diagram, edge]
    datasets: [canonical_diagram_png]
    checks:
      - kind: all_docs_ready
      - kind: any_doc_has_source_types
        source_types: [diagram_edge]

  - id: D-005
    suite: D
    title: PPTX slide graph generation
    objective: Validate slide-level and document-level graph chunks for multi-slide decks.
    tags: [diagram, pptx, graph]
    datasets: [lakerunner_slide_decks]
    checks:
      - kind: doc_count_equals
        value: 2
      - kind: all_docs_ready
      - kind: each_doc_has_source_types
        source_types: [slide_graph]

  - id: D-006
    suite: D
    title: Diagram pipeline under load
    objective: Validate diagram parser stability on 500-image subset.
    tags: [diagram, scale]
    datasets: [spdocvqa_first_500]
    automation_level: partial
    checks:
      - kind: doc_count_equals
        value: 500
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: E-001
    suite: E
    title: Chunk generation non-emptiness
    objective: Ensure every ready document has chunks.
    tags: [integrity, chunks]
    datasets: [canonical_small_pack]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: E-002
    suite: E
    title: Embedding cardinality match
    objective: Ensure embedding count equals chunk count per document.
    tags: [integrity, embeddings]
    datasets: [canonical_small_pack]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_embeddings_match_chunks

  - id: E-003
    suite: E
    title: Embedding dimension consistency
    objective: Ensure a single embedding dimension across ingested records.
    tags: [integrity, embeddings]
    datasets: [canonical_small_pack]
    checks:
      - kind: all_docs_ready
      - kind: single_embedding_dim

  - id: E-004
    suite: E
    title: Source type distribution sanity
    objective: Ensure expected source-type diversity for mixed docs.
    tags: [integrity, source-type]
    datasets: [canonical_pptx, invoice_pdf_0015]
    checks:
      - kind: all_docs_ready
      - kind: any_doc_has_source_types
        source_types: [text, table, ocr, slide_graph, diagram_graph, diagram_node, diagram_edge]

  - id: E-005
    suite: E
    title: Metadata completeness
    objective: Validate metadata-rich chunks for image-heavy docs.
    tags: [integrity, metadata]
    datasets: [canonical_diagram_png, canonical_jpg]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: E-006
    suite: E
    title: Delete document cleanup
    objective: Verify document deletion cascades to chunks/embeddings/graphs and leaves tables empty.
    tags: [integrity, cleanup]
    datasets: [canonical_pdf]
    delete_after: true
    checks:
      - kind: all_docs_ready
      - kind: db_table_empty
        table: documents
      - kind: db_table_empty
        table: chunks
      - kind: db_table_empty
        table: embeddings
      - kind: db_table_empty
        table: diagram_graphs

  - id: E-007
    suite: E
    title: Delete-all cleanup
    objective: Verify delete-all endpoint clears all core tables after a mixed ingest.
    tags: [integrity, cleanup]
    datasets: [canonical_small_pack]
    delete_all_after: true
    checks:
      - kind: db_table_empty
        table: documents
      - kind: db_table_empty
        table: chunks
      - kind: db_table_empty
        table: embeddings
      - kind: db_table_empty
        table: diagram_graphs

  - id: F-001
    suite: F
    title: Basic semantic retrieval
    objective: Validate grounded response quality for canonical PDF queries.
    tags: [retrieval, chat, semantic]
    datasets: [canonical_pdf]
    chat_probes:
      - prompt: "Summarize LakeRunner architecture."
      - prompt: "What capabilities are listed in LakeRunner?"
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

  - id: F-002
    suite: F
    title: Invoice retrieval
    objective: Validate retrieval grounding over multi-invoice corpus.
    tags: [retrieval, chat, invoices]
    datasets: [all_invoice_pdfs]
    chat_probes:
      - prompt: "List invoice IDs found across these documents."
      - prompt: "Which invoices mention INV-ID-21-0015?"
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

  - id: F-003
    suite: F
    title: Diagram intent routing
    objective: Validate diagram-oriented retrieval responses.
    tags: [retrieval, chat, diagram]
    datasets: [canonical_diagram_png]
    chat_probes:
      - prompt: "Explain this diagram step by step."
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

  - id: F-004
    suite: F
    title: Relationship query behavior
    objective: Validate relationship-style questions on PPTX graph-rich data.
    tags: [retrieval, chat, relationships]
    datasets: [canonical_pptx]
    chat_probes:
      - prompt: "How are the components connected across slides?"
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

  - id: F-005
    suite: F
    title: Cross-document compare
    objective: Validate cross-document synthesis and scoped source citations.
    tags: [retrieval, chat, compare]
    datasets: [canonical_pdf, canonical_pptx]
    chat_probes:
      - prompt: "Compare architecture described in PDF vs PPT."
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

  - id: F-006
    suite: F
    title: Doc scope enforcement
    objective: Validate that source citations obey per-request document scope.
    tags: [retrieval, chat, scope]
    datasets: [canonical_pdf, canonical_pptx]
    chat_probes:
      - prompt: "Summarize only the first selected document."
        use_case_doc_ids: false
        doc_ids: ["__FIRST_DOC__"]
      - prompt: "Now summarize using both selected documents."
        use_case_doc_ids: false
        doc_ids: ["__ALL_CASE_DOCS__"]
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

  - id: F-007
    suite: F
    title: Empty or invalid scope rejection
    objective: Validate scope validation for unknown document ids.
    tags: [retrieval, chat, scope, negative]
    datasets: []
    wait_ready: false
    chat_probes:
      - prompt: "This should fail due to invalid scope."
        use_case_doc_ids: false
        doc_ids: ["unknown-doc-id"]
        expect_error_contains: "Unknown document id"
        require_non_empty_answer: false
    checks:
      - kind: chat_any_error
      - kind: chat_expected_errors
    automation_level: partial
    expected_notes:
      - Non-ready scope validation remains a manual/targeted variant due race sensitivity.

  - id: G-001
    suite: G
    title: Medium image batch ingestion
    objective: Validate ingestion stability for 500-image subset.
    tags: [scale, ingestion, stability]
    datasets: [spdocvqa_first_500]
    automation_level: partial
    checks:
      - kind: doc_count_equals
        value: 500
      - kind: all_docs_ready

  - id: G-002
    suite: G
    title: Large image batch ingestion
    objective: Validate full corpus ingestion for responsiveness and graceful throughput.
    tags: [scale, ingestion, longrun]
    datasets: [spdocvqa_all]
    automation_level: partial
    checks:
      - kind: all_docs_ready

  - id: G-003
    suite: G
    title: Mixed-format batch ingestion stress
    objective: Validate mixed extractor stability at higher load.
    tags: [scale, ingestion, mixed]
    datasets: [all_lakerunner_docs, all_invoice_pdfs, spdocvqa_first_200]
    automation_level: partial
    checks:
      - kind: all_docs_ready

  - id: G-004
    suite: G
    title: Restart durability test
    objective: Validate persistence/retrieval consistency across service restart.
    tags: [scale, resilience, restart]
    datasets: [spdocvqa_first_500]
    automation_level: manual
    manual_steps:
      - Run case once to completion.
      - Restart backend app.
      - Re-query previously ingested docs to confirm retrieval continuity.
    checks: []

  - id: H-001
    suite: H
    title: Regression snapshot for chunk and source distribution
    objective: Capture baseline chunk/source-type distributions for canonical suite.
    tags: [regression, snapshot]
    datasets: [canonical_small_suite]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: H-002
    suite: H
    title: Regression snapshot for diagram metrics
    objective: Capture baseline diagram graph densities and node/edge distributions.
    tags: [regression, snapshot, diagram]
    datasets: [canonical_diagram_png, canonical_pptx]
    checks:
      - kind: all_docs_ready
      - kind: any_doc_has_source_types
        source_types: [diagram_graph, slide_graph]

  - id: H-003
    suite: H
    title: Regression snapshot for OCR confidence
    objective: Capture OCR behavior baseline over invoice plus sampled image corpus.
    tags: [regression, snapshot, ocr]
    datasets: [representative_invoice_pdfs, spdocvqa_first_20]
    checks:
      - kind: all_docs_ready
      - kind: each_doc_min_chunks
        value: 1

  - id: H-004
    suite: H
    title: Regression snapshot for retrieval quality
    objective: Capture baseline retrieval outputs for fixed query set and citation behavior.
    tags: [regression, snapshot, retrieval]
    datasets: [canonical_small_suite]
    chat_probes:
      - prompt: "Summarize key architecture components."
      - prompt: "Which document discusses invoice IDs?"
      - prompt: "What does the diagram describe?"
    checks:
      - kind: all_docs_ready
      - kind: chat_non_empty
      - kind: chat_sources_scoped

